server {
    listen 80;
    server_name sirens.yourdomain.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sirens.yourdomain.org;

    ssl_certificate /etc/letsencrypt/live/sirens.yourdomain.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sirens.yourdomain.org/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /opt/sirentracker/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
